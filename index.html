<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Comparte tus Fotos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-cream: #FDFBF7;
            --color-gold: #C4A484;
            --color-text: #4A3B31;
            --color-bg-envelope: #EAE3D9;
        }

        body {
            background-color: var(--color-cream);
            color: var(--color-text);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        .script-font {
            font-family: 'Alex Brush', cursive;
        }

        .body-font {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
        }

        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            opacity: 0.4;
            pointer-events: none;
            z-index: 10;
        }

        .monogram {
            border: 1px solid var(--color-gold);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }

        .btn-share {
            background-color: var(--color-gold);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(196, 164, 132, 0.3);
        }

        .btn-share:active {
            transform: scale(0.95);
        }

        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: var(--color-gold);
            margin: 1.5rem auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="texture-overlay"></div>

    <main class="max-w-md w-full z-20 fade-in">
        <!-- Monograma -->
        <div class="monogram">
            <span class="script-font text-4xl text-[#C4A484]" style="margin-top: -5px;">MD</span>
        </div>

        <h2 class="body-font text-xs uppercase tracking-[0.3em] mb-4 text-[#8C7A6B]">Nuestra Boda</h2>

        <!-- Nombres -->
        <h1 class="script-font text-5xl md:text-6xl mb-2 text-[#4A3B31]">
            Maria Yutzil <br> 
            <span class="text-4xl">&</span> <br>
            Gilberto Daniel
        </h1>

        <div class="divider"></div>

        <!-- Mensaje -->
        <div class="px-4 mb-10">
            <p class="text-xl italic mb-4">"Cada momento es un regalo, gracias por capturarlo con nosotros."</p>
            <p class="body-font text-[10px] uppercase font-light leading-relaxed">
                Ayúdanos a guardar cada recuerdo de este día especial subiendo tus fotos al álbum compartido.
            </p>
        </div>

        <!-- Botón CTA -->
        <a href="https://photos.app.goo.gl/r49tV3ZJgiWPYJ7Z6" 
           target="_blank"
           class="btn-share inline-block w-full py-5 px-8 rounded-full text-white body-font text-sm font-semibold uppercase tracking-widest mb-10">
            Subir Fotos Aquí
        </a>

        <!-- Fecha -->
        <div class="mt-8">
            <p class="body-font text-sm tracking-[0.2em] font-medium">21 MARZO 2026</p>
        </div>
    </main>

    <footer class="mt-auto py-8 z-20">
        <p class="body-font text-[9px] uppercase tracking-widest text-[#A8988B]">Con amor, M & D</p>
    </footer>

    <!-- Script para prevenir scrolls accidentales y mejorar feedback visual -->
    <script>
        document.querySelector('.btn-share').addEventListener('click', function(e) {
            // Un pequeño retraso para que el usuario sienta el feedback del clic antes de salir
            console.log('Redirigiendo al álbum de Google Photos...');
        });
    </script>
</body>
</html>
